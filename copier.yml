_min_copier_version: "9.0.0"
_templates_suffix: .jinja
_subdirectory: template
_skip_if_exists:
  - README.md
  - CHANGELOG.md
  - SECURITY.md
  - CONTRIBUTING.md
  - CODEOWNERS # active only when use_codeowners: true
  - TASKS.md
  - .env
  - "**/.gitkeep"
_exclude:
  - "**/__pycache__"
  - .git
  - _partials
_tasks:
  - ["git", "init"]
  - command: |
      if git remote get-url origin >/dev/null 2>&1 && [ "$(git remote get-url origin)" = "{{ fork_upstream }}" ]; then
        git remote rename origin upstream
      else
        git remote add upstream "{{ fork_upstream }}" 2>/dev/null || true
      fi
    when: "{{ fork_upstream and _copier_operation == 'copy' }}"
  - command: ["git", "fetch", "upstream"]
    when: "{{ fork_upstream and _copier_operation == 'copy' }}"
  - command: ["git", "branch", "--set-upstream-to=upstream/{{ fork_upstream_branch }}", "main"]
    when: "{{ fork_upstream and _copier_operation == 'copy' }}"
  - command: "pre-commit install"
    when: "{{ use_precommit and _copier_operation == 'copy' }}"
  - command: "pre-commit install --hook-type commit-msg"
    when: "{{ use_commitizen and use_precommit and _copier_operation == 'copy' }}"
  - command: >-
      command -v apm >/dev/null 2>&1 && apm install || echo "  → apm not found — run: apm install"
    when: "{{ use_apm and _copier_operation == 'copy' }}"
_migrations: []
# To add a migration:
#   - version: v1.1.0
#     command: migrate-script.sh
#     when: "{{ _stage == 'before' }}"
# _external_data:
#   parent_tpl: .copier-answers.yml
_jinja_extensions:
  - jinja2_time.TimeExtension
_envops:
  undefined: jinja2.StrictUndefined
  trim_blocks: true
  lstrip_blocks: true
_message_after_copy: |
  {{ repo_name }} scaffolded successfully.

  Next steps:
    cd {{ _copier_conf.dst_path }}
    {% if use_precommit %}pre-commit install
    pre-commit install --hook-type commit-msg
    {% endif %}
    {% if include_shell_tooling %}shellcheck **/*.sh{% endif %}
    Start coding{% if languages %} in {{ languages | join(', ') }}{% endif %}.
  {% if use_apm %}apm install   # if apm not auto-detected during scaffold{% endif %}
  {% if ci_provider == 'github' %}
  Repository settings:
    Enable "Require signed commits" in branch protection rulesets.
    Enable Dependabot alerts and security updates.
  {% endif %}
  {% if fork_upstream %}  Remote `upstream` set to {{ fork_upstream }}.
    Create your fork on your forge, then: git remote add origin <your-fork-url>
  {% endif %}
_message_after_update: |
  {{ repo_name }} updated from {{ _version_from }} to {{ _version_to }}.
  Review changes with: git diff
  {% if use_precommit %}Re-run: pre-commit install{% endif %}
repo_name:
  type: str
  help: Repository name (kebab-case)
  default: my-project
  validator: "{% if not (repo_name | regex_search('^[a-z][a-z0-9-]*$')) %}Must be kebab-case (lowercase, hyphens, no spaces){% endif %}"
repo_description:
  type: str
  help: One-line description
  default: ""
author_name:
  type: str
  help: Author or organization name
  default: ""
author_email:
  type: str
  help: Author or organization email
  default: ""
  validator: "{% if author_email and not (author_email | regex_search('.+@.+\\..+')) %}Must be a valid email or left empty{% endif %}"
github_username:
  type: str
  help: GitHub username or org slug (URL-safe, used in repo URLs)
  default: "{{ author_name | lower | replace(' ', '-') }}"
license_type:
  type: str
  help: License
  choices:
    - MIT
    - Apache-2.0
    - GPL-3.0
    - proprietary
  default: MIT
languages:
  type: yaml
  help: Programming languages used
  multiselect: true
  choices:
    - python
    - javascript
    - typescript
    - go
    - rust
    - dotnet
    - tofu
  default: []
# ── computed helpers (available to subsequent when: conditions) ──
has_node:
  type: bool
  default: "{{ 'javascript' in languages or 'typescript' in languages }}"
  when: false
has_python:
  type: bool
  default: "{{ 'python' in languages }}"
  when: false
has_typescript:
  type: bool
  default: "{{ 'typescript' in languages }}"
  when: false
has_go:
  type: bool
  default: "{{ 'go' in languages }}"
  when: false
has_rust:
  type: bool
  default: "{{ 'rust' in languages }}"
  when: false
has_dotnet:
  type: bool
  default: "{{ 'dotnet' in languages }}"
  when: false
has_tofu:
  type: bool
  default: "{{ 'tofu' in languages }}"
  when: false
# ── language-specific interactive questions ──
tofu_context:
  type: str
  help: OpenTofu usage context
  choices:
    - org
    - app
  default: org
  when: "{{ has_tofu }}"
go_scaffolding:
  type: str
  help: Go directory layout
  choices:
    - application
    - tooling
  default: application
  when: "{{ has_go }}"
go_module_path:
  type: str
  help: Go module path
  default: "{{ 'github.com/' + (github_username | default('user') | lower) + '/' + repo_name }}"
  when: "{{ has_go }}"
dotnet_namespace:
  type: str
  help: .NET root namespace
  default: "{{ repo_name | replace('-', ' ') | title | replace(' ', '') }}"
  when: "{{ has_dotnet }}"
python_scaffolding:
  type: str
  help: Python directory layout
  choices:
    - application
    - tooling
  default: application
  when: "{{ has_python }}"
node_package_manager:
  type: str
  help: Node package manager
  choices:
    - npm
    - pnpm
    - yarn
    - bun
  default: npm
  when: "{{ has_node }}"
ci_provider:
  type: str
  help: CI/CD provider
  choices: |
    {% if languages | length > 0 %}
    - github
    {% else %}
    - none
    {% endif %}
  default: "{% if languages | length > 0 %}github{% else %}none{% endif %}"
use_precommit:
  type: bool
  help: Enable pre-commit hooks?
  default: true
use_commitizen:
  type: bool
  help: Enforce Conventional Commits via commitizen?
  default: "{{ languages | length > 0 }}"
include_code_of_conduct:
  type: bool
  help: Include a Code of Conduct?
  default: false
include_todo_check:
  type: bool
  help: Include CI check that blocks FIXME/HACK/BUG annotations?
  default: false
include_shell_tooling:
  type: bool
  help: Include shell tooling (.shellcheckrc)?
  default: false
include_contributing:
  type: bool
  help: Include CONTRIBUTING.md?
  default: false
include_security:
  type: bool
  help: Include SECURITY.md?
  default: false
use_codeowners:
  type: bool
  help: Use CODEOWNERS for automated PR review assignment?
  default: false
use_apm:
  type: bool
  help: Scaffold apm.yml for agent dependency management?
  default: false
gitleaks_allowlist:
  type: yaml
  default: []
  when: false
gitleaks_allowlist_description:
  type: str
  default: "project-specific exclusions"
  when: false
apm_packages:
  type: yaml
  default: []
  when: false
# ── fork workflow ──
fork_upstream:
  type: str
  help: Upstream repo URL for fork workflow (sets git `upstream` remote)
  placeholder: https://github.com/original-owner/repo.git
  default: ""
fork_upstream_branch:
  type: str
  help: Upstream default branch name
  default: main
  when: "{{ fork_upstream }}"
codeowners_maintainers:
  type: str
  help: CODEOWNERS default team (e.g. @myorg/maintainers)
  default: ""
  when: "{{ use_codeowners }}"
codeowners_frontend:
  type: str
  help: CODEOWNERS frontend team
  default: ""
  when: "{{ use_codeowners and has_node }}"
codeowners_devops:
  type: str
  help: CODEOWNERS DevOps/infra team
  default: ""
  when: "{{ use_codeowners and (has_tofu or ci_provider == 'github') }}"
# ── remaining computed values ──
project_slug:
  type: str
  default: "{{ repo_name | lower | replace('-', '_') | replace(' ', '_') }}"
  when: false
copyright_year:
  type: str
  default: "{% now 'utc', '%Y' %}"
  when: false
go_directive:
  type: str
  default: "1.26"
  when: false
go_prior1:
  type: str
  default: "{{ '1.' ~ (go_directive.split('.')[1] | int - 1) | string }}"
  when: false
go_prior2:
  type: str
  default: "{{ '1.' ~ (go_directive.split('.')[1] | int - 2) | string }}"
  when: false
python_version:
  type: str
  default: "3.12"
  when: false
rust_version:
  type: str
  default: "1.96"
  when: false
dotnet_sdk_version:
  type: str
  default: "10.0.200"
  when: false
dotnet_tfm:
  type: str
  default: "net10.0"
  when: false
node_version:
  type: str
  default: "24"
  when: false
tofu_version:
  type: str
  default: "1.12.0"
  when: false
tflint_version:
  type: str
  default: "0.9.1"
  when: false
